<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter to Win | Gloriosos Italian Market</title>
</head>
<body style="margin:0;padding:40px;background:#f5f5f5;">

<div style="max-width:500px;margin:auto;padding:20px;border-radius:20px;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,0.1);font-family:Arial;">
  <h2 style="text-align:center;">🎉 Enter to Win!</h2>
  <p style="text-align:center;color:#666;">Win a Gift Card from Gloriosos Italian Market</p>

  <form action="https://formspree.io/f/mzdkvqka" method="POST">
    <input type="text" name="First Name" placeholder="First Name" required style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;">
    
    <input type="text" name="Last Name" placeholder="Last Name" required style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;">
    
    <input type="email" name="Email" placeholder="Email Address" required style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;">
    
    <input type="tel" name="Phone" placeholder="Phone Number" required style="width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;">

    <input type="hidden" name="Source" value="Website Giveaway">
    <input type="hidden" name="_subject" value="New Enter to Win Submission - Gloriosos Italian Market">

    <label style="font-size:12px;display:block;margin-top:8px;">
      <input type="checkbox" name="Consent" required>
      I agree to receive promotions and updates
    </label>

    <button type="submit" style="width:100%;padding:14px;margin-top:10px;background:#111;color:#fff;border:none;border-radius:10px;font-weight:bold;">
      ENTER NOW
    </button>
  </form>
</div>

</body>
</html>
